<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Generador de paletas de colores para diseño rápido e intuitivo" />
  <title>ColorflyStudio</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <header>
    <div class="header-content">
      <h1>Colorfly Studio</h1>
      <p>Menos tiempo, mejor color</p>
    </div>
  </header>

  <main>
    <section class="controls">
  <div class="size-selector">
    <label for="paletteSize">Cantidad de colores:</label>
    <select id="paletteSize" name="paletteSize">
      <option value="6">6 colores</option>
      <option value="8">8 colores</option>
      <option value="9">9 colores</option>
    </select>
  </div>
  <button id="generateBtn">Generar paleta</button>
</section>
  </main>

  <footer>
    <p>Hecho para crear mejor</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
